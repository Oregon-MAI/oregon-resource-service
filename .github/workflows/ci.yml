name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: Oregon-MAI/oregon-ci-templates/.github/workflows/lint-go.yml@main
    secrets: inherit
    with:
      go-version: "1.26"
      working-directory: "."
      fail-on-error: true

  test:
    uses: Oregon-MAI/oregon-ci-templates/.github/workflows/test-go.yml@main
    with:
      go-version: "1.26"
      test-packages: "./..."

  docker:
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    uses: Oregon-MAI/oregon-ci-templates/.github/workflows/docker-push.yml@main
    secrets: inherit
    with:
      push_to_registry: ${{
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))}}
      platforms: "linux/amd64,linux/arm64"
